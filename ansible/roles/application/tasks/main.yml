---
- name: Require an application image to be specified
  ansible.builtin.assert:
    that:
      - app_image | length > 0
    fail_msg: >-
      app_image is empty. Pass it explicitly, e.g.
      ansible-playbook ... -e app_image=123456789012.dkr.ecr.us-east-1.amazonaws.com/cloudforge-app
      (the Jenkins pipeline's dockerDeploy step does this automatically).

- name: Ensure application directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ app_install_dir }}"
    - "{{ app_install_dir }}/logs"

- name: Log in to ECR
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region }} \
      | docker login --username AWS --password-stdin {{ app_ecr_registry }}
  changed_when: false
  when: app_ecr_login

- name: Fetch the application secret from Secrets Manager
  ansible.builtin.set_fact:
    app_secret_value: "{{ lookup('amazon.aws.aws_secret', app_secret_name, region=aws_region) }}"
  no_log: true
  when: app_secret_name | length > 0

- name: Run the application container
  community.docker.docker_container:
    name: "{{ app_name }}"
    image: "{{ app_image }}:{{ app_image_tag }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    recreate: true
    pull: true
    published_ports:
      - "127.0.0.1:{{ app_port }}:{{ app_container_port }}"
    volumes:
      - "{{ app_install_dir }}/logs:/app/logs"
    env: "{{ app_env | combine({'APP_SECRET': app_secret_value} if app_secret_name | length > 0 else {}) | combine({'AWS_REGION': aws_region, 'APP_PORT': app_container_port | string}) }}"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
  no_log: true # the env block may contain APP_SECRET; never let it hit the log
