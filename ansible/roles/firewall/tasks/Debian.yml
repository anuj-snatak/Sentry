---
- name: Install ufw
  ansible.builtin.package:
    name: ufw
    state: present

- name: Set default ufw policy (deny incoming, allow outgoing)
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow required TCP ports through ufw
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Allow SSH through ufw
  community.general.ufw:
    rule: allow
    port: "{{ firewall_ssh_port | string }}"
    proto: tcp
  when: firewall_allow_ssh

- name: Enable ufw
  community.general.ufw:
    state: enabled
