---
- name: Ensure logrotate is installed
  ansible.builtin.package:
    name: logrotate
    state: present

- name: Deploy per-target logrotate configuration
  ansible.builtin.template:
    src: logrotate-target.j2
    dest: "/etc/logrotate.d/{{ item.name }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ logrotate_targets }}"
  loop_control:
    label: "{{ item.name }}"
